<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    
    <radialGradient id="bs-field" cx="20%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a1030" stop-opacity="0.9"></stop>
      <stop offset="60%" stop-color="#03050a" stop-opacity="0"></stop>
    </radialGradient>
    
    <linearGradient id="bs-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffecb0"></stop>
      <stop offset="30%" stop-color="#fbbf24"></stop>
      <stop offset="52%" stop-color="#c8920a"></stop>
      <stop offset="75%" stop-color="#6e4a05"></stop>
      <stop offset="100%" stop-color="#2a1c02"></stop>
    </linearGradient>
    <radialGradient id="bs-metal-r" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff2c0"></stop>
      <stop offset="45%" stop-color="#e0a420"></stop>
      <stop offset="100%" stop-color="#4a3108"></stop>
    </radialGradient>
    
    <radialGradient id="bs-aether" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8e7ff" stop-opacity="0.9"></stop>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.7"></stop>
      <stop offset="70%" stop-color="#1a3660" stop-opacity="0.5"></stop>
      <stop offset="100%" stop-color="#03050a" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="bs-plasma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"></stop>
      <stop offset="50%" stop-color="#c084fc"></stop>
      <stop offset="100%" stop-color="#39ff14"></stop>
    </linearGradient>
    <filter id="bs-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="bs-deepglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <g transform="translate(50,50)">
    <circle r="46" fill="url(#bs-field)"></circle>

    
    <circle r="44" fill="none" stroke="url(#bs-metal)" stroke-width="0.9" opacity="0.9"></circle>
    <g opacity="0.85" stroke="#fbbf24" stroke-width="0.6">
      <g><line x1="0" y1="-44" x2="0" y2="-40"></line></g>
      <g transform="rotate(30)"><line x1="0" y1="-44" x2="0" y2="-41"></line></g>
      <g transform="rotate(60)"><line x1="0" y1="-44" x2="0" y2="-40"></line></g>
      <g transform="rotate(90)"><line x1="0" y1="-44" x2="0" y2="-41"></line></g>
      <g transform="rotate(120)"><line x1="0" y1="-44" x2="0" y2="-40"></line></g>
      <g transform="rotate(150)"><line x1="0" y1="-44" x2="0" y2="-41"></line></g>
      <g transform="rotate(180)"><line x1="0" y1="-44" x2="0" y2="-40"></line></g>
      <g transform="rotate(210)"><line x1="0" y1="-44" x2="0" y2="-41"></line></g>
      <g transform="rotate(240)"><line x1="0" y1="-44" x2="0" y2="-40"></line></g>
      <g transform="rotate(270)"><line x1="0" y1="-44" x2="0" y2="-41"></line></g>
      <g transform="rotate(300)"><line x1="0" y1="-44" x2="0" y2="-40"></line></g>
      <g transform="rotate(330)"><line x1="0" y1="-44" x2="0" y2="-41"></line></g>
    </g>

    
    <circle r="38" fill="none" stroke="#8a5a08" stroke-width="0.5" stroke-dasharray="0.5 2" opacity="0.9"></circle>

    
    <g filter="url(#bs-glow)" opacity="0.95">
      <polygon points="0,-34 29.4,17 -29.4,17" fill="none" stroke="url(#bs-metal)" stroke-width="0.9"></polygon>
      <polygon points="0,34 29.4,-17 -29.4,-17" fill="none" stroke="url(#bs-metal)" stroke-width="0.9"></polygon>
      <g transform="rotate(30)">
        <polygon points="0,-34 29.4,17 -29.4,17" fill="none" stroke="#c8920a" stroke-width="0.6" opacity="0.7"></polygon>
        <polygon points="0,34 29.4,-17 -29.4,-17" fill="none" stroke="#c8920a" stroke-width="0.6" opacity="0.7"></polygon>
      </g>
    </g>

    
    <circle r="18" fill="url(#bs-aether)" filter="url(#bs-deepglow)"></circle>
    <circle r="18" fill="none" stroke="url(#bs-metal-r)" stroke-width="1.1"></circle>

    
    <g stroke="#00e5ff" stroke-width="0.5" fill="none" opacity="0.65">
      <circle cx="-5" cy="0" r="11"></circle>
      <circle cx="5" cy="0" r="11"></circle>
      <circle cx="0" cy="-5" r="11"></circle>
      <circle cx="0" cy="5" r="11"></circle>
    </g>

    
    <g filter="url(#bs-glow)">
      <line x1="-14" y1="0" x2="14" y2="0" stroke="url(#bs-metal)" stroke-width="0.8"></line>
      <line x1="0" y1="-14" x2="0" y2="14" stroke="url(#bs-metal)" stroke-width="0.8"></line>
      <circle r="3.2" fill="#fff2c0"></circle>
      <circle r="1.6" fill="#00e5ff"></circle>
    </g>

    
    <g fill="url(#bs-metal-r)">
      <circle cx="0" cy="-38" r="1.4"></circle>
      <circle cx="38" cy="0" r="1.4"></circle>
      <circle cx="0" cy="38" r="1.4"></circle>
      <circle cx="-38" cy="0" r="1.4"></circle>
    </g>
  </g>

  
  <g transform="translate(108,0)">
    
    <line x1="0" y1="28" x2="200" y2="28" stroke="url(#bs-metal)" stroke-width="0.5" opacity="0.5"></line>
    <text x="0" y="48" font-family="Cinzel Decorative, Cinzel, serif" font-size="20" font-weight="700" fill="url(#bs-metal)" letter-spacing="6" filter="url(#bs-glow)">BIOSPARK</text>
    
    <text x="0" y="49" font-family="Cinzel Decorative, Cinzel, serif" font-size="20" font-weight="700" fill="#0a0a14" letter-spacing="6" opacity="0.35">BIOSPARK</text>
    <text x="0" y="48" font-family="Cinzel Decorative, Cinzel, serif" font-size="20" font-weight="700" fill="url(#bs-metal)" letter-spacing="6">BIOSPARK</text>
    
    <line x1="0" y1="58" x2="96" y2="58" stroke="#c8920a" stroke-width="0.4" opacity="0.7"></line>
    <path d="M100 58 L104 54 L108 58 L104 62 Z" fill="url(#bs-metal)"></path>
    <line x1="112" y1="58" x2="200" y2="58" stroke="#c8920a" stroke-width="0.4" opacity="0.7"></line>
    
    <text x="0" y="74" font-family="JetBrains Mono, monospace" font-size="8" fill="#94a3b8" letter-spacing="6">STUDIOS · ORDO QUILL</text>
    <text x="0" y="86" font-family="Cormorant Garamond, serif" font-size="9" font-style="italic" fill="#94a3b8" letter-spacing="2" opacity="0.8">As Above · So Below · So Woven</text>
  </g>
</svg>