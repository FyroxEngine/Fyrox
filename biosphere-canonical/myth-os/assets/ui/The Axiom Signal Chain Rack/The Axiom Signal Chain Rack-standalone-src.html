<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Axiom Signal Chain Rack · BioSpark Studios</title>
<meta name="viewport" content="width=1440, initial-scale=1">
<link rel="stylesheet" href="biospark/colors_and_type.css">
<link rel="stylesheet" href="rack.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#03050a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#1a0a2e"/>
        <stop offset="100%" stop-color="#03050a"/>
      </radialGradient>
      <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#fbbf24"/>
        <stop offset="50%" stop-color="#ff1493"/>
        <stop offset="100%" stop-color="#00bfff"/>
      </linearGradient>
      <radialGradient id="core" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff"/>
        <stop offset="30%" stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#9400d3" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="1200" height="800" fill="url(#bg)"/>
    <!-- Rack chassis silhouette -->
    <rect x="180" y="180" width="840" height="440" rx="20" fill="none" stroke="#2a2436" stroke-width="3"/>
    <rect x="200" y="200" width="64" height="400" rx="6" fill="#181c2a"/>
    <rect x="936" y="200" width="64" height="400" rx="6" fill="#181c2a"/>
    <!-- Module rows -->
    <rect x="280" y="220" width="640" height="110" rx="4" fill="#0f1320" stroke="#1e8cff" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="280" y="345" width="640" height="110" rx="4" fill="#0f1320" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="280" y="470" width="640" height="110" rx="4" fill="#0f1320" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Central crest -->
    <circle cx="600" cy="400" r="160" fill="url(#core)" opacity="0.5"/>
    <circle cx="600" cy="400" r="110" fill="none" stroke="url(#rim)" stroke-width="3"/>
    <circle cx="600" cy="400" r="70" fill="none" stroke="rgba(251,191,36,0.5)" stroke-width="1" stroke-dasharray="4 6"/>
    <path d="M600 320 L600 380 M600 420 L600 480 M520 400 L580 400 M620 400 L680 400" stroke="url(#rim)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="600" cy="400" r="14" fill="url(#rim)"/>
    <!-- Wordmark -->
    <text x="600" y="700" text-anchor="middle" font-family="Georgia, serif" font-size="32" letter-spacing="6" fill="#fbbf24" opacity="0.85">THE AXIOM SIGNAL CHAIN RACK</text>
    <text x="600" y="730" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="4" fill="#94a3b8" opacity="0.6">BIOSPARK STUDIOS · QUILL OS</text>
  </svg>
</template>

<div id="root"></div>
<script>
  // Defaults persisted to disk via Tweaks panel
  window.__RACK_TWEAKS = /*EDITMODE-BEGIN*/{
    "moduleIdentity": "per-module",
    "cableStyle": "chain",
    "background": "cosmos",
    "density": "packed",
    "colorIntensity": "standard",
    "showInstrumentBank": true
  }/*EDITMODE-END*/;
</script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="rack-primitives.jsx"></script>
<script type="text/babel" src="rack-modules.jsx"></script>
<script type="text/babel" src="rack-app.jsx"></script>
</body>
</html>
