# MYTH-OS  —  CANONICAL ATOM SEED POOL
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file is the master definition of every atom available to the ATOMS
# chemistry engine.  The engine reads this at boot, plants them in the quantum
# soup, and lets resonance bonding crystallise them into molecules and apps.
#
# COVERAGE key (workspace_status field):
#   "live"        — implemented in a workspace crate right now
#   "partial"     — concept exists but not fully wired
#   "planned"     — on the Tier build queue
#   "conceptual"  — idea is captured; no Rust yet
#
# TAG RESONANCE: atoms bond when they share ≥1 tag.  The more shared tags,
# the stronger the bond weight.  Departments bond more readily within
# themselves but can cross-bond across departments via shared tags.
#
# DEPARTMENTS
#   SYS  — Core Architecture & OS infrastructure
#   SEC  — Security, Seals & Lineage Hashing
#   NAV  — Spatial & Navigation
#   COG  — AI, Cognition & Memory
#   NAR  — Narrative Engine & Loom
#   UI   — Interface, UI/UX & Director Tools
#   MED  — Media, Audio & Animation
# ═══════════════════════════════════════════════════════════════════════════════

